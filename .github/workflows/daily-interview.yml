name: Daily Interview Prep

on:
  schedule:
    # 9:00 AM IST is 3:30 AM UTC
    - cron: "30 3 * * *"
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-prep:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm install

      - name: 📦 Install Dependencies
        # This is the "Gold Standard" for CI/CD
        run: npm ci

      - name: 🎯 Run Interview Prep Task
        # Map your GitHub Secrets to Environment Variables
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MOCK_GEMINI: ${{ secrets.MOCK_GEMINI }} # Optional: Use this to toggle between real and mock responses
          DISCORD_INTERVIEW_PREP_URL: ${{ secrets.DISCORD_INTERVIEW_PREP_URL }}
          DISCORD_ERROR_LOGS_URL: ${{ secrets.DISCORD_ERROR_LOGS_URL }}
        run: npx tsx src/tasks/interview-prep/engine.ts
