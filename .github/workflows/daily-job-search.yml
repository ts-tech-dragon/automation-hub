name: Daily Job Search

on:
  schedule:
    - cron: "30 12 * * *" # 6:30 PM IST
  workflow_dispatch:

jobs:
  run-prep:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm install

      - name: 📦 Install Dependencies
        # This is the "Gold Standard" for CI/CD
        run: npm ci

      - name: 🔎 Run Job Search
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: npx tsx src/tasks/job-listing/engine.ts
      - name: 📸 Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            debug-*.png
            debug-*.html
