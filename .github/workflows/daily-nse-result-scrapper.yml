name: NSE Scrapper Engine

on:
  schedule:
    # Runs every hour at the 30-minute mark
    # Between 8:30 AM and 11:30 PM IST, Monday to Friday
    - cron: "30 1-15 * * 1-5"
    # Allows you to run the worker manually from the Actions tab
  workflow_dispatch:
jobs:
  run-prep:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm install

      - name: 📦 Install Dependencies
        # This is the "Gold Standard" for CI/CD
        run: npm ci

      - name: 🕦 Run NSE Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ERROR_LOGS_URL: ${{secrets.DISCORD_ERROR_LOGS_URL }}
        run: npx tsx src/tasks/nse-earnings/engine.ts
