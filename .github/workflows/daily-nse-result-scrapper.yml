name: NSE Scrapper Engine

on:
  schedule:
    # 3:00 AM UTC (8:30 AM IST) to 6:00 PM UTC (11:30 PM IST)
    # This runs at the top of the hour UTC, which is the :30 mark in IST
    - cron: "0 3-18 * * 1-5"
  workflow_dispatch: # Allows manual run
jobs:
  run-prep:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm install

      - name: 📦 Install Dependencies
        # This is the "Gold Standard" for CI/CD
        run: npm ci

      - name: 🕦 Run NSE Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ERROR_LOGS_URL: ${{secrets.DISCORD_ERROR_LOGS_URL }}
          MONGODB_URI: ${{secrets.MONGODB_URI }}

        run: npx tsx src/tasks/nse-earnings/engine.ts
