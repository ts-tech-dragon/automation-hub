name: Daily Recipe Generator

on:
  # Trigger 1: For manual button in GitHub UI
  workflow_dispatch:

  # Trigger 2: For external API calls (Apps Script)
  repository_dispatch:
    types: [daily_recipe_trigger]

jobs:
  build-and-run:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🖼️ Install Canvas Dependencies
        # Ubuntu needs these system libraries to compile the 'canvas' package
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🚀 Run Daily Recipe Generator
        env:
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_MARI_NUMBER: ${{ secrets.WHATSAPP_MARI_NUMBER }}

        run: npx tsx src/tasks/miscellaneous/receipe/engine.ts
