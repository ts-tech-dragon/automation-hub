name: Shine Daily Job Apply

on:
  schedule:
    # Runs at 7:30 AM IST (2:00 AM UTC)
    - cron: "30 1 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🚀 Run Shine Job Engine
        env:
          # Pass your environment variables here
          SHINE_STORAGE_JSON: ${{ secrets.SHINE_STORAGE_JSON }}
          # NODE_ENV: production
        run: npx tsx src/tasks/job-listing/shine/engine.ts

      - name: Upload Screenshots Artifact
        uses: actions/upload-artifact@v4
        if: always() # Upload even if the script fails/expires
        with:
          name: shine-debug-screenshots
          path: |
            *.png
          retention-days: 5
